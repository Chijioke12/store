<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Open KaiStore</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="theme-color" content="#4facfe">
	<link rel="icon" type="image/svg+xml" href="icon.svg" sizes="any">
	<link rel="stylesheet" href="/src/style.css">
	<script src="/src/compatibility.js"></script>
</head>
<body>
	<header>Open KaiStore</header>
	
	<main id="app-content">
		<div id="category-container"></div>
		<div id="loading" class="message">Loading apps...</div>
		<div id="error" class="message hidden"></div>
		<div id="app-list"></div>
	</main>

	<!-- Search View -->
	<div id="view-search" class="view hidden">
		<div class="app-header">Search Apps</div>
		<div style="padding: 10px;">
			<input type="text" id="search-view-input" class="search-input-field" placeholder="Type here..." focusable>
		</div>
		<div id="search-results-list"></div>
	</div>

	<main id="view-details" class="hidden"></main>

	<div id="custom-dialog" class="hidden">
		<div id="custom-dialog-content">
			<h3 id="custom-dialog-title">Title</h3>
			<p id="custom-dialog-msg">Message goes here...</p>
		</div>
	</div>

	<div id="softkey-bar">
		<div id="softkey-left"></div>
		<div id="softkey-center"></div>
		<div id="softkey-right"></div>
	</div>

	<script type="module" src="/src/main.js"></script>
</body>
</html>
