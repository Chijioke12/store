<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Open KaiStore</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="theme-color" content="#4facfe">
	<link rel="icon" type="image/svg+xml" href="icon.svg" sizes="any">
	<link rel="stylesheet" href="/src/style.css">
	<script src="/src/compatibility.js"></script>
</head>
<body>
	<header>Open KaiStore</header>
	
	<main id="app-content">
		<div id="search-container">
			<input type="text" id="search-input" placeholder="Search apps...">
		</div>
		<div id="loading" class="message">Loading apps...</div>
		<div id="error" class="message hidden"></div>
		<div id="app-list"></div>
	</main>

	<main id="view-details" class="hidden"></main>

	<main id="view-settings" class="hidden">
		<div style="margin-bottom: 20px;">
			<h2 class="app-title" style="font-size: 1.3rem; border-bottom: 1px solid #ccc; padding-bottom: 8px;">⚙️ Registry Settings</h2>
		</div>
		<div style="margin-bottom: 20px;">
			<label style="display: block; font-weight: bold; margin-bottom: 6px; font-size: 0.95rem;" for="proxy-input">Manifest Proxy URL</label>
			<input type="text" id="proxy-input" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;" placeholder="https://example.render.com">
			<p style="font-size: 0.8rem; color: #666; margin-top: 5px; line-height: 1.3;">Point this to your own deployed Node server. If left empty, it safely uses our high-speed Cloud Run server backend.</p>
		</div>
		<div style="background: #eef1f6; padding: 10px; border-radius: 4px; border-left: 4px solid #0078d7; margin-bottom: 15px;">
			<p style="margin: 0 0 5px 0; font-size: 0.85rem; font-weight: bold;">Current Fallback Server:</p>
			<p style="margin: 0; font-size: 0.8rem; font-family: monospace; word-break: break-all; color: #333;">https://ais-pre-jj6imgbwlmzjgjuvyqa3d5-34852309071.europe-west1.run.app</p>
		</div>
	</main>

	<div id="softkey-bar">
		<div id="softkey-left"></div>
		<div id="softkey-center"></div>
		<div id="softkey-right"></div>
	</div>

	<script type="module" src="/src/main.js"></script>
</body>
</html>
